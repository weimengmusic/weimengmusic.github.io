<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>崴孟幸福祈願</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Noto Sans TC", sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #0f3460); /* 保留原漸層 */
  color: white;
  text-align: center;
  position: relative; /* 讓 ::before 定位基準在 body */
}

/* 浮動背景行星 */
body::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 30%;            /* 預設占螢幕寬度比例 */
  max-width: 400px;      /* 桌面版最大寬度 */
  height: auto;
  aspect-ratio: 1 / 1;   /* 保持行星為正方形 */
  background: url('planet.png') no-repeat center center;
  background-size: contain;
  opacity: 0.2;           /* 半透明 */
  transform: translate(-50%, -50%);
  animation: floatPlanet 10s ease-in-out infinite alternate;
  z-index: 0;
  overflow: hidden;   /* 防止飄浮圖片跑出螢幕 */
}

/* 漂浮動畫 */
@keyframes floatPlanet {
  0%   { transform: translate(-50%, -50%) translateY(0px) rotate(0deg); }
  50%  { transform: translate(-50%, -50%) translateY(-20px) rotate(2deg); }
  100% { transform: translate(-50%, -50%) translateY(0px) rotate(0deg); }
}

/* 手機版 RWD */
@media screen and (max-width: 600px) {
  body::before {
    width: 50%;          /* 手機螢幕自動縮小到50%寬 */
    max-width: 200px;    /* 手機上最大寬度限制 */
    opacity: 0.15;       /* 可再調淡 */
  }
}

.container { padding: 40px 20px; }

#mainTitle {
  font-size: 3rem;
  font-weight: bold;
  color: #ff79c6;
  background: linear-gradient(45deg, #ff7eb3, #ffd700, #ff758c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 
    0 0 1px #fff, 
    0 0 15px #ffb6c1, 
    0 0 25px #ffd700, 
    0 0 35px #ff7eb3;
  margin: 40px 0;
  animation: floatTitle 3s ease-in-out infinite;
}

#mainTitle .subtitle {
  display: block;              /* 換行在主標題下 */
  font-size: 0.45em;            /* 主標題的 60% */
  font-weight: normal;
  color: rgba(255,255,255,0.8);
  -webkit-text-fill-color: rgba(255,255,255,0.8);
  text-shadow: 
    0 0 1px #fff, 
    0 0 15px #ffb6c1, 
    0 0 25px #ffd700, 
    0 0 35px #ff7eb3;
  margin-top: 0px;
}

/* 手機 RWD */
@media screen and (max-width: 600px) {
  #mainTitle {
    font-size: 3rem;            /* 主標題縮小 */
  }

  #mainTitle .subtitle {
    font-size: 0.45em;           /* 小字自動跟著縮小 */
  }
}

/* 標題緩慢上下漂浮 */
@keyframes floatTitle {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-8px) rotate(-1deg); }
  100% { transform: translateY(0px); }
}

/* 進階名字/願望輸入框 */
input, textarea {
  width: 80%;
  padding: 14px 18px;
  margin: 12px 0;
  border-radius: 20px;
  border: none;
  outline: none;
  box-sizing: border-box;

  background: linear-gradient(135deg, rgba(255, 182, 193, 0.2), rgba(255, 215, 0, 0.2));
  color: #fff;
  font-size: 16px;
  font-weight: 500;

  /* 內陰影 + 輕微浮動光暈 */
  box-shadow: inset 0 0 8px rgba(255,255,255,0.3), 0 0 15px rgba(255,182,193,0.2);
  backdrop-filter: blur(5px);
  transition: all 0.3s ease;
}

/* 聚焦效果 */
input:focus, textarea:focus {
  background: linear-gradient(135deg, rgba(255, 182, 193, 0.4), rgba(255, 215, 0, 0.4));
  box-shadow: inset 0 0 12px rgba(255,255,255,0.5), 0 0 25px rgba(255,215,0,0.4);
  transform: translateY(-2px);
}

/* placeholder 文字漸層效果 */
input::placeholder, textarea::placeholder {
  color: rgba(255,255,255,0.7);
  font-style: italic;
  text-shadow: 0 0 4px rgba(255,182,193,0.5);
}

/* 文字框浮動微動畫 */
@keyframes floatInput {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-3px); }
  100% { transform: translateY(0px); }
}
input, textarea {
  animation: floatInput 3s ease-in-out infinite;
}



#animation { height: 250px; position: relative; }

.character {
  position: absolute;
  bottom: -200px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
}

.character img { width: 180px; }

.show { animation: rise 2s forwards; }

@keyframes rise {
  0% { bottom: -200px; opacity: 0; }
  100% { bottom: 40px; opacity: 1; }
}

.star {
  position: absolute;
  width: 6px; height: 6px;
  background: white; border-radius: 50%;
  animation: floatUp 2s forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity:1; }
  100% { transform: translateY(-200px); opacity:0; }
}

.card {
  margin: 40px auto;
  width: 90%;
  max-width: 400px;
  border-radius: 20px;
  padding: 3px; /* 👉 邊框厚度 */

  /* ✨ 外層當邊框 */
  background: linear-gradient(45deg, #ff7eb3, #ff758c, #ffd700, #ff7eb3);

  display: none;
  box-shadow:
    0 0 15px rgba(255,182,193,0.6),
    0 0 25px rgba(255,215,0,0.5);
}

.card-inner {
  border-radius: 20px;
  padding: 40px 25px 25px 25px;
  color: #333;
  position: relative;
  overflow: visible;

  /* 夢幻粉色底 + 半透明背景圖 + 星塵幾何元素 */
  background-color: #fff0ff;

  background-image:
    url('bg.png'), /* 水彩背景圖 */
    radial-gradient(circle at 50% 50%, #ffe6f0, #fff0ff), /* 粉色漸層底 */
    linear-gradient(135deg, rgba(255,182,193,0.15), rgba(255,215,0,0.1)), /* 輕微光暈 */
    radial-gradient(circle at 10% 15%, rgba(255,255,255,0.25) 4px, transparent 5px),
    radial-gradient(circle at 80% 20%, rgba(255,255,255,0.2) 6px, transparent 7px),
    radial-gradient(circle at 25% 75%, rgba(255,255,255,0.15) 5px, transparent 6px),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,0.1) 3px, transparent 4px),
    repeating-linear-gradient(45deg, rgba(255,182,193,0.03) 0, rgba(255,182,193,0.03) 3px, transparent 3px, transparent 8px),
    repeating-linear-gradient(-45deg, rgba(255,215,0,0.03) 0, rgba(255,215,0,0.03) 4px, transparent 4px, transparent 10px);

  background-repeat: no-repeat;
  background-size: contain, cover, cover, auto, auto, auto, 50px 50px, 60px 60px;
  background-position: center center;

  /* 讓背景圖半透明柔光 */
  background-blend-mode: normal; /* ⭐ 可試 overlay / soft-light 也超夢幻 */

  /* 微光暈 + 外層柔光 */
  box-shadow: 
    inset 0 0 40px rgba(255,255,255,0.15), 
    0 0 25px rgba(255,182,193,0.15),
    0 0 40px rgba(255,215,0,0.1);

  filter: drop-shadow(0 0 10px rgba(255,182,193,0.2)) drop-shadow(0 0 15px rgba(255,215,0,0.15));
}

.card-emoji {
  position: absolute;
  top: -35px;     /* 往外凸 */
  right: -25px;   /* 往外凸 */
  font-size: 50px; /* 大一點 */
  transform: rotate(19deg);
  z-index: 10;
  pointer-events: none;

  /* 可選：發光效果 */
  filter: drop-shadow(0 0 10px #fff) drop-shadow(0 0 15px #ffd700);
}

.card-emoji-left {
  position: absolute;
  bottom: -20px;  /* 超出卡片 */
  left: -20px;
  font-size: 50px;
  transform: rotate(10deg);
  z-index: 10;
  pointer-events: none;
  filter: drop-shadow(0 0 8px #fff) drop-shadow(0 0 12px #ffb6c1);
}

.card-emoji-right {
  position: absolute;
  bottom: -15px;  /* 超出卡片 */
  right: -20px;
  font-size: 50px;
  transform: rotate(-10deg);
  z-index: 10;
  pointer-events: none;
  filter: drop-shadow(0 0 8px #fff) drop-shadow(0 0 12px #ffd700);
}

.card-date {
  position: absolute;
  top: 12px;
  left: 15px;
  font-size: 12px;
  color: #000000;
  opacity: 0.8;
}

/* ✨ 祝福區塊 */
.blessing-box {
  margin-top: 15px;
  padding: 15px;
  border-radius: 15px;
  background: linear-gradient(135deg, #fff6fb, #ffe6f0);
  border: 2px dashed #ffb6d9;
  position: relative;
  box-shadow: 0 0 10px rgba(255,182,193,0.4);
}

/* 上方標題 */
.blessing-title {
  font-size: 14px;
  color: #ff69b4;
  font-weight: bold;
  margin-bottom: 6px;
  letter-spacing: 2px;
}

/* 祝福文字 */
.blessing-text {
  font-size: 15px;
  color: #444;
  line-height: 1.6;
  font-style: italic;
}

/* 小星星裝飾 */
.blessing-box::before,
.blessing-box::after {
  content: "✨";
  position: absolute;
  font-size: 14px;
  animation: sparkle 2s infinite alternate;
}

.blessing-box::before {
  top: -8px;
  left: 10px;
}

.blessing-box::after {
  bottom: -8px;
  right: 10px;
}

.card .sparkle {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #fff;
  opacity: 0.8;
  animation: sparkleAnim 2s infinite alternate;
}

@keyframes sparkleAnim {
  0% { transform: translate(0,0) scale(0.5); opacity:0.5; }
  50% { transform: translate(10px,-10px) scale(1.2); opacity:1; }
  100% { transform: translate(-10px,10px) scale(0.8); opacity:0.6; }
}

.card p.name {
  font-size: 20px;
  font-weight: bold;
  color: #ff69b4;
  text-shadow: 0 0 6px #fff, 0 0 12px #ffd700;
  margin: 10px 0 5px 0;
}

.card p.wish {
  font-size: 16px;
  font-style: italic;
  color: #333;
  line-height: 1.6;
  margin: 5px 0 10px 0;
  position: relative;
}

/* 小星光 */
.card p.wish::after {
  content: "✨";
  position: absolute;
  top: -5px;
  right: -5px;
  font-size: 16px;
  animation: sparkle 2s infinite alternate;
}

@keyframes sparkle {
  0% { opacity:0; transform: scale(0.5); }
  50% { opacity:1; transform: scale(1.2) rotate(10deg); }
  100% { opacity:0; transform: scale(0.5) rotate(-10deg); }
}

.card #probabilityTag {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(255, 215, 0, 0.8);
  color: #000;
  font-weight: bold;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 14px;
  box-shadow: 0 0 10px #ffd700;
}

.card img {
  width: 100%;
  border-radius: 15px;
  box-shadow: 0 0 15px #fff, 0 0 25px #ffd700, 0 0 40px #ff7eb3;
  transition: transform 0.5s ease-in-out, box-shadow 0.5s ease-in-out;
}
.card img:hover {
  transform: scale(1.05) rotate(-1deg);
  box-shadow: 0 0 25px #fff, 0 0 35px #ffd700, 0 0 50px #ff7eb3;
}

.card h3 {
  font-size: 26px;
  font-weight: bold;
  text-align: center;
  color: #541a32;

  text-shadow:
    0 0 6px rgba(255,255,255,0.9),
    0 0 12px rgba(255,182,193,0.8),
    0 0 18px rgba(255,105,180,0.7),
    0 0 25px rgba(255,215,0,0.5),
    2px 2px 0 #ff758c,
    -2px -2px 0 #ffd700;
}

.card p {
  font-size: 16px;
  line-height: 1.6;
  position: relative;
}

.card p::after {
  content: "✨";
  position: absolute;
  font-size: 15px;
  top: -5px;
  right: -20px;
  animation: sparkle 2s infinite alternate;
}

@keyframes sparkle {
  0% { opacity:0; transform: scale(0.5); }
  50% { opacity:1; transform: scale(1.2) rotate(10deg); }
  100% { opacity:0; transform: scale(0.5) rotate(-10deg); }
}

#downloadBtn {
  background: linear-gradient(45deg,#ff7eb3,#ff758c);
  color:white;
  padding:12px 26px;
  border-radius:30px;
  border:none;
  cursor:pointer;
  box-shadow: 0 6px 15px rgba(255, 182, 193, 0.5), 0 0 15px #ffd700;
  transition: transform 0.2s, box-shadow 0.2s;
}

#downloadBtn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(255, 182, 193, 0.7), 0 0 25px #ffd700;
}

/* 機率面板 */
#ratePanel {
  display:none;
  margin-top:20px;
  background: rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
}

#probabilityDisplay {
  margin-top: 10px;
  font-size: 16px;
  color: #ffd700;
}

.rate-grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(80px,1fr));
  gap:15px;
}

.rate-item img {
  width:100%;
  border-radius:10px;
  pointer-events: none;
  filter: blur(1.2px) brightness(0.7); /* 馬賽克效果 */
}

.rate-item { font-size:12px; }

button {
  padding: 12px 26px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(45deg,#ff7eb3,#ff758c);
  color: white;
  cursor: pointer;
  margin: 5px;
  font-size: 16px;
}

/* 共用按鈕風格 */
button, .floating-home-btn {
  padding: 14px 28px;
  border-radius: 30px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  color: #fff;
  background: linear-gradient(45deg, #ff7eb3, #ff758c, #ffd700);
  box-shadow: 0 0 15px rgba(255,182,193,0.5), 0 0 25px rgba(255,215,0,0.4);
  transition: all 0.3s ease-in-out;
  position: relative;
  overflow: hidden;
}

/* 浮動光暈動畫 */
button::before, .floating-home-btn::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 70%);
  transform: rotate(0deg);
  transition: all 0.5s ease;
  z-index: 0;
}

/* 按鈕文字置前 */
button span, .floating-home-btn span {
  position: relative;
  z-index: 1;
}

/* hover 發光 + 放大 */
button:hover, .floating-home-btn:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 25px rgba(255,182,193,0.7), 0 0 35px rgba(255,215,0,0.6), 0 0 45px rgba(255,105,180,0.5);
}

/* 微微上下浮動動畫 */
@keyframes floatBtn {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-4px); }
  100% { transform: translateY(0px); }
}
button, .floating-home-btn {
  animation: floatBtn 3s ease-in-out infinite;
}

/* 手機版按鈕稍微縮小 */
@media screen and (max-width: 600px) {
  .floating-home-btn {
    bottom: 15px;
    right: 0px;
    padding: 13px 13px;
    font-size: 16px;
    white-space: normal; /* 允許換行 */
    line-height: 1.2;    /* 行距 */
  }
}

/* 彈跳視窗背景遮罩 */
#rateModal {
  display: none; 
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 2000;
  justify-content: center;
  align-items: center;
}

/* 彈窗內容 */
#rateModal .modal-content {
  background: linear-gradient(135deg,#fff,#ffe6f0);
  border-radius: 20px;
  padding: 25px;
  max-width: 600px;  /* 電腦版最大寬度增加 */
  width: 90%;
  color: #333;
  text-align: center;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  position: relative;
}

/* 關閉按鈕 */
/* 關閉按鈕 - 垂直水平居中於方形按鈕 */
#rateModal .close-btn {
  position: absolute;
  top: 15px;   
  right: 15px; 
  background: #ff758c;
  border: none;
  color: white;
  font-size: 20px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  transition: transform 0.2s;
}

#rateModal .close-btn:hover {
  transform: scale(1.2);
}

/* 手機版調整 */
@media screen and (max-width: 600px) {
  #rateModal .modal-content {
    max-width: 90%;
    padding: 20px;
  }

  #rateModal .close-btn {
    top: 10px;
    right: 10px;
    width: 28px;
    height: 28px;
    line-height: 28px;
    font-size: 18px;
  }
}

.angel {
  position: absolute;
  width: 60px;
  opacity: 0;
  pointer-events: none;
  transform: translate(-50%, 0) rotate(0deg);
  animation: floatAngel 2s forwards;
  box-shadow: 0 0 12px #fff; /* 閃光效果 */
}

@keyframes floatAngel {
  0% {
    opacity: 0;
    transform: translate(-50%, 0) scale(0.3) rotate(0deg);
  }
  30% {
    opacity: 1;
    transform: translate(-50%, -50px) scale(1) rotate(45deg);
  }
  60% {
    transform: translate(-50%, -120px) scale(1.1) rotate(90deg);
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -200px) scale(0.5) rotate(180deg);
  }
}

/* 卡片發光動畫 */
@keyframes glowEffect {
  0%, 100% { box-shadow: 0 0 10px #fff; }
  50% { box-shadow: 0 0 25px #ffd700; }
}

#char.show img {
  animation: glowEffect 1.5s ease-in-out infinite alternate;
  filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 20px #ffd700);
}

#animation .probabilityLabel {
  position: absolute;
  color: #ffd700;
  font-weight: bold;
  font-size: 16px;
  text-shadow: 0 0 8px #fff, 0 0 12px #000000;
  pointer-events: none;
  left: 50%;
  transform: translateX(-50%);
  bottom: -5px; /* 卡片下方一點點 */
  z-index: 500;
  opacity: 0;              /* 初始隱藏 */
  transition: opacity 1s ease; /* 淡入效果 */
}

.intro-text {
  max-width: 600px;
  margin: 0 auto 25px auto;
  padding: 18px 22px;

  font-size: 16px;
  line-height: 1.9;
  letter-spacing: 1px;

  color: rgba(255,255,255,0.9);
  text-align: center;

  background: rgba(255,255,255,0.06);
  border-radius: 18px;

  backdrop-filter: blur(6px);
  box-shadow: 0 0 15px rgba(255,182,193,0.25);

  animation: fadeIn 1.5s ease;
}

/* ✨ 手機優化 */
@media screen and (max-width: 600px) {
  .intro-text {
    width: 90%;
    padding: 16px;

    font-size: 15px;
    line-height: 1.8;

    border-radius: 15px;
  }
}

/* ===== Loading 畫面 ===== */
#loadingScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at top, #1a1a2e, #0f3460);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* 行星動畫 */
.loading-content .planet {
  width: 100px;
  height: 100px;
  background: url('planet.png') no-repeat center/contain;
  animation: spinPlanet 3s linear infinite;
  margin: 0 auto 20px;
}

/* 文字 */
.loading-text {
  color: #fff;
  font-size: 18px;
  letter-spacing: 2px;
  animation: fadeText 2s ease-in-out infinite;
}

/* 動畫 */
@keyframes spinPlanet {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes fadeText {
  0%,100% { opacity: 0.4; }
  50% { opacity: 1; }
}

#screenshotNotice {
  margin: 15px auto 40px auto;
  font-size: clamp(14px, 2vw, 18px); /* 自動縮放字體 */
  color: #ffd700;
  text-align: center;
  text-shadow: 0 0 6px #ff79c6, 0 0 12px #fff;
  max-width: 90%;
  line-height: 1.5;
}

</style>
</head>
<body>
<div id="loadingScreen">
  <div class="loading-content">
    <div class="planet"></div>
    <p class="loading-text">正在進入崴孟星球...</p>
  </div>
</div>

<div class="container">
  <h1 id="mainTitle">
    崴孟幸福祈願
    <span class="subtitle">by 崴崴孟孟</span>
  </h1>
  <p class="intro-text">
    在崴孟星球裡，<br>
    每一個願望都值得被溫柔對待✨
    <br><br>
    「崴孟幸福祈願」是一個由崴孟打造的小小世界，
    希望能陪你許下一個願望，
    並在未來的某一天，幸福實現💫
  </p>

  <input id="name" placeholder="輸入你的名字">
  <textarea id="wish" placeholder="寫下你的願望..."></textarea>
  <br>

  <!-- 原本的三個按鈕 -->
  <div class="button-row">
    <button onclick="makeWish()"><span>送出願望</span></button>
    <button onclick="toggleRates()"><span>查看卡片機率</span></button>
  </div>


  <div id="animation">
    <div id="char" class="character">
      <img id="charImg" src="0.png">
    </div>
  </div>

  <div id="card" class="card">
    <div class="card-inner"></div>
  </div>
  <button id="downloadBtn" style="display:none" onclick="downloadCard()">下載卡片</button>

  <!-- 截圖提示 -->
  <p id="screenshotNotice">
    歡迎截圖下來，把崴孟祈願卡留在你身邊🦋
  </p>

  <!-- 顯示出現機率區塊 -->
  <div id="probabilityDisplay"></div>

  <!-- 卡片機率彈窗 -->
  <div id="rateModal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal()">×</button>
      <h3>卡片出現機率</h3>
      <div class="rate-grid" id="rateGridModal"></div>
    </div>
  </div>
</div>

<button class="floating-home-btn" onclick="window.location.href='https://weimengmusic.com/'">
  <span>返回<br>首頁</span>
</button>

<!-- Footer -->
<footer style="margin-top:40px; padding:20px; background: rgba(0,0,0,0.3); color:white; text-align:center; font-size:14px; line-height:1.6;">
  <p>
    崴孟官方網站：
    <a href="https://weimengmusic.com/" target="_blank" style="color:#ffd700; text-decoration:none;">
      https://weimengmusic.com/
    </a>
  </p>

  <p>
    聯絡信箱：
    <a href="mailto:weimengmusic@gmail.com" style="color:#ffd700; text-decoration:none;">
      weimengmusic@gmail.com
    </a>
  </p>

  <!-- <p>
    訂閱崴孟親筆信，
    <a href="https://weimengmusic.com/social/" target="_blank" style="color:#ffd700; text-decoration:underline;">
      領取情人節卡片
    </a>！
  </p> -->

  <p>崴崴孟孟. All rights reserved.</p>
</footer>

<script>
const pool = [
  {img:"3.png", weight:5},
  {img:"0.png", weight:10},
  {img:"4.png", weight:25},
  {img:"1.png", weight:30},
  {img:"2.png", weight:30}
];

const messages = [
  "這份願望，正在被崴孟星球溫柔地守護著，相信宇宙的力量一定可以讓它幸福實現的✨",
  "崴孟已經為你灑下幸福的光芒，相信願望未來一定會幸福成真💫",
  "只要相信自己，願望就會在未來的某個時刻悄然發生唷💖",
  "慢慢走也沒關係，只要繼續前進，願望就會越來越靠近🌙",
  "崴孟會給你滿滿的幸福力量，讓你更靠近心中的願望✨"
];

function randomMessage(){
  return messages[Math.floor(Math.random() * messages.length)];
}

function totalWeight(){ return pool.reduce((s,p)=>s+p.weight,0); }

function weightedRandom(){
  let total = totalWeight();
  let rand = Math.random()*total;
  for(let p of pool){
    if(rand < p.weight) return p;
    rand -= p.weight;
  }
}

function createStars(){
  const container = document.getElementById("animation");
  // 在生成 card 內容後
  for(let i=0;i<12;i++){
    const s=document.createElement("div");
    s.className="sparkle";
    s.style.top=Math.random()*90+"%";
    s.style.left=Math.random()*90+"%";
    card.appendChild(s);
  }
}

function createAngel() {
  const container = document.getElementById("animation");
  const angel = document.createElement("img");
  angel.src = "angel_shop2.png";
  angel.className = "angel";
  
  // 隨機水平位置
  angel.style.left = Math.random() * 80 + 10 + "%";
  container.appendChild(angel);

  // 2秒後自動移除
  setTimeout(() => angel.remove(), 2000);
}

// 修改 makeWish() 的抽卡動畫部分
function makeWish() {
  // 下面放你原本的抽卡動畫邏輯
  const name = document.getElementById("name").value;
  const wish = document.getElementById("wish").value;
  if (!name || !wish) { alert("請填寫"); return; }

  const char=document.getElementById("char");
  const img=document.getElementById("charImg");
  const card=document.getElementById("card");
  const btn=document.getElementById("downloadBtn");

  const result = weightedRandom();
  const msg = randomMessage(); // ⭐ 新增
  img.src = result.img;

  createStars();

  for(let i=0;i<5;i++){
    setTimeout(createAngel, i*150);
  }

  char.classList.remove("show");
  void char.offsetWidth;
  char.classList.add("show");

  const total = totalWeight();
  const percent = Math.round(result.weight / total * 100);

  // ====== 生成固定機率標籤 ======
  let probLabel = document.getElementById("probabilityLabel");
  if(!probLabel){
    probLabel = document.createElement("div");
    probLabel.id = "probabilityLabel";
    probLabel.className = "probabilityLabel";
    document.getElementById("animation").appendChild(probLabel);
  }
  probLabel.textContent = `出現機率：${percent}%`;
  probLabel.style.opacity = 0; // 確保一開始隱藏

  // 等抽卡動畫完成再淡入
  setTimeout(()=>{
    probLabel.style.opacity = 1; // 慢慢淡入
  }, 2000); // 2 秒，和 char/show 動畫同步
  // ===============================

  // 顯示卡片時淡入 + 微微上下飄動
  setTimeout(()=>{
    card.style.display="block";
    // btn.style.display="inline-block";

    const now = new Date();
    const dateStr = now.toLocaleDateString("zh-TW");

    // 先找到 card-inner
    const cardInner = card.querySelector(".card-inner");

    // 清空內容，但保留背景
    cardInner.innerHTML = `
      <div class="card-inner">
        <div class="card-emoji">🥰</div>
        <div class="card-emoji-left">✨</div>   <!-- 左下 -->
        <div class="card-emoji-right">✨</div>  <!-- 右下 -->
        <div class="card-date">${dateStr}</div>

        <img src="${result.img}">
        <h3>🌟 崴孟祈願卡 🌟</h3>

        <p><b>${name}</b></p>
        <p>${wish}</p>

        <div class="blessing-box">
          <div class="blessing-title">✨ 崴孟給你的祝福 ✨</div>
          <div class="blessing-text">${msg}</div>
        </div>
      </div>
    `;
    // 微微上下浮動
    card.animate([
      { transform: 'translateY(-10px)' },
      { transform: 'translateY(0px)' },
      { transform: 'translateY(-10px)' }
    ], { duration: 2000, iterations: Infinity });
  },2000);
}

function downloadCard(){
  const card = document.getElementById("card");
  const cardInner = card.querySelector(".card-inner");

  // 先記錄原始內容
  const originalBg = cardInner.style.backgroundImage;

  // 1️⃣ 下載時，改成單一 img 背景
  cardInner.style.backgroundImage = `url('bg.png')`;
  cardInner.style.backgroundSize = 'contain'; // 保持比例
  cardInner.style.backgroundRepeat = 'no-repeat';
  cardInner.style.backgroundPosition = 'center';

  // 2️⃣ 統一寬度，高度自動
  const originalWidth = card.style.width;
  const originalHeight = card.style.height;
  card.style.width = '400px';
  card.style.height = 'auto';

  html2canvas(card, { useCORS: true, scale: 2, backgroundColor: null })
    .then(canvas => {
      const link = document.createElement("a");
      link.download = "wish_card.png";
      link.href = canvas.toDataURL("image/png");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      // 3️⃣ 還原原本樣式
      cardInner.style.backgroundImage = originalBg;
      card.style.width = originalWidth;
      card.style.height = originalHeight;
    })
    .catch(err => {
      alert("下載失敗，請再試一次");
      console.error(err);
    });
}

// 全局函數：顯示彈窗
function toggleRates(){
  const modal = document.getElementById("rateModal");
  const grid = document.getElementById("rateGridModal");
  grid.innerHTML = "";

  const total = totalWeight();
  const sorted = [...pool].sort((a,b)=>a.weight - b.weight);

  sorted.forEach(p=>{
    const percent = Math.round(p.weight / total * 100);
    const div = document.createElement("div");
    div.className="rate-item";
    div.innerHTML = `
      <img src="${p.img}">
      <div>${percent}%</div>
    `;
    grid.appendChild(div);
  });

  modal.style.display = "flex"; // 顯示彈窗
}

// 關閉彈窗
function closeModal(){
  document.getElementById("rateModal").style.display = "none";
}

// 點擊遮罩也可以關閉
document.getElementById("rateModal").addEventListener("click", function(e){
  if(e.target === this) closeModal();
});

document.addEventListener('click', function(e) {
  const cursorEffect = document.createElement('img');
  cursorEffect.src = 'cursor.png';
  cursorEffect.style.position = 'fixed'; // ✅ 改成 fixed
  cursorEffect.style.width = '105px';
  cursorEffect.style.height = '65px';
  cursorEffect.style.pointerEvents = 'none';
  cursorEffect.style.opacity = 1;
  cursorEffect.style.transform = 'scale(1)';
  cursorEffect.style.transition = 'all 0.6s ease-out';

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  let left = e.clientX - 105/2;
  let top  = e.clientY - 65/2;

  // 限制不超出邊界
  left = Math.max(0, Math.min(left, vw - 105));
  top  = Math.max(0, Math.min(top, vh - 65));

  cursorEffect.style.left = left + 'px';
  cursorEffect.style.top  = top + 'px';

  document.body.appendChild(cursorEffect);

  // 漸隱放大效果
  setTimeout(() => {
    cursorEffect.style.opacity = 0;
    cursorEffect.style.transform = 'scale(1.5)';
  }, 10);

  setTimeout(() => cursorEffect.remove(), 600);
});

window.addEventListener("load", () => {
  setTimeout(() => {
    const loading = document.getElementById("loadingScreen");
    loading.style.transition = "opacity 1s ease";
    loading.style.opacity = 0;

    setTimeout(() => loading.remove(), 1000);
  }, 1200); // 停留時間可調
});

</script>

</body>
</html>
